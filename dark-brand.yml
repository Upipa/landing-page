meta:
  name:
    short: IndicareSaluteLab
    full: IndicareSaluteLab Service by Upipa
  link:
    home: https://www.upipa.tn.it # Placeholder link for the company homepage

logo:
  images:
    icon: logos/logo-header_old.png
    full: logos/islab-logo-full.png
  small: icon
  medium: full
  large: full

color:
  palette:
    white: "#fefefe" 
    black: "#010101"
    blue: "#2b7baf"
    yellow: "#558201"
  foreground: white
  background: black
  primary: blue
  secondary: yellow

typography:
  fonts:
    - family: Open Sans
      source: google
      weight: [400, 600, 700]
      style: [normal, italic]
    - family: Roboto Slab
      source: google
      weight: [400, 700]
      style: [normal]
    - family: Fira Code
      source: google
      weight: 400
  base:
    family: Open Sans
    weight: 400
  headings:
    family: Roboto Slab
    weight: 700
    color: primary
  monospace:
    family: Fira Code
    weight: 400
  link:
    color: primary
    decoration: underline

defaults:
  shiny:
    theme:
      defaults:
        navbar-bg: $brand-blue
      rules: |
        .btn-primary {
          background-color: $brand-blue;
          border-color: $brand-blue;
        }
        .btn-primary:hover {
          background-color: $brand-yellow;
          border-color: $brand-yellow;
        }